<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC Voca - Cloud Sync</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📊 Cloud TOEIC Master</h1>
        
        <nav>
            <button onclick="showSection('main')">학습/테스트</button>
            <button onclick="showSection('review')">오답 저장소</button>
            <button onclick="syncData()" id="sync-btn">🔄 데이터 동기화</button>
        </nav>

        <!-- 메인 학습 및 테스트 섹션 -->
        <section id="main-section">
            <div class="controls">
                <input type="number" id="target-day" placeholder="Day 입력 (예: 1)">
                <button onclick="startSession('practice')">연습하기</button>
                <button onclick="startSession('test')">Day 테스트</button>
                <button onclick="startSession('random')" style="background: #8e44ad;">전체 랜덤 테스트</button>
            </div>
            
            <div id="quiz-container" class="hidden">
                <div id="question-box">
                    <p id="display-word">단어를 불러오는 중...</p>
                    <input type="text" id="user-answer" placeholder="뜻을 입력하세요" onkeypress="handleKeyPress(event)">
                    <button onclick="checkAnswer()">확인</button>
                </div>
                <p id="feedback"></p>
                <p id="progress"></p>
            </div>
        </section>

        <!-- 오답 관리 섹션 -->
        <section id="review-section" class="hidden">
            <h3>오답 노트</h3>
            <p>테스트 중 틀린 단어는 구글 시트에 실시간 저장됩니다.</p>
            <div id="incorrect-info">데이터 로딩 중...</div>
            <button onclick="startSession('incorrect')" id="btn-retry-incorrect" disabled>오답 시험 보기</button>
            <button onclick="window.open(SHEET_URL)" class="btn-sheet">구글 시트 열기</button>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
